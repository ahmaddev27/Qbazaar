openapi: 3.1.0
info:
  title: QBazaar API
  version: 1.0.0
  description: |
    REST API for QBazaar — Qatar's friendly classifieds marketplace.

    All endpoints are versioned under `/api/v1/`. Authentication uses
    Sanctum Personal Access Tokens with a custom refresh-token layer.

    See [error-codes.md](../error-codes.md) for the full error catalog,
    and [events/messages.yaml](../events/messages.yaml) for WebSocket events.
  contact:
    name: Ahmed Jaber
    email: ahmedjaberdev@gmail.com
  license:
    name: Proprietary
servers:
  - url: http://localhost:8000
    description: Local dev (Laravel)
  - url: http://localhost:4010
    description: Local mock (Prism)
  - url: https://api.qbazaar.qa
    description: Production
tags:
  - name: Health
    description: Health check & version endpoints
  - name: Auth
    description: Registration, login, OTP, password reset
  - name: Account
    description: Authenticated user's own profile, sessions, privacy
  - name: Users
    description: Public profiles & user-targeted actions (block, view ads)
  - name: Categories
    description: Marketplace category tree, dynamic filters and fields
  - name: Locations
    description: Qatar regions and districts
  - name: Uploads
    description: Image uploads with multi-size conversions
  - name: Ads
    description: Ad CRUD, drafts, publishing, moderation lifecycle
  - name: Search
    description: Meilisearch-powered keyword + filter search
  - name: Favorites
    description: Save / unsave ads
  - name: Conversations
    description: Chat threads between buyer and seller
  - name: Messages
    description: Messages within a conversation
  - name: Offers
    description: Price offers attached to ads / conversations
  - name: Reports
    description: User reports on ads, users, conversations
  - name: Notifications
    description: In-app, email, and push notifications
  - name: CMS
    description: Static pages, help articles, support tickets

paths:
  /api/v1/health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns 200 if the API is reachable. Used by uptime monitors and Sprint 0 verification.
      operationId: health
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  value:
                    success: true
                    data:
                      status: ok
                      version: 1.0.0
                      timestamp: '2026-05-20T10:00:00.000Z'

  # ──────────────────────────────────────────────────────────────────────────
  # Auth (Sprint 1)
  # ──────────────────────────────────────────────────────────────────────────
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new account
      operationId: authRegister
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              valid:
                value:
                  full_name: أحمد العلي
                  email: ahmed@example.qa
                  phone: '+97455123456'
                  password: 'Str0ng!Pass'
                  account_type: private
                  language: ar
                  accepted_terms: true
      responses:
        '201':
          description: Account created. An OTP has been sent to the phone.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseEnvelope'
              examples:
                created:
                  value:
                    success: true
                    data:
                      user:
                        id: 01HM3XQVZP5KJWQR2K8N0DJSAW
                        full_name: أحمد العلي
                        email: ahmed@example.qa
                        phone: '+97455123456'
                        account_type: private
                        status: active
                        email_verified: false
                        phone_verified: false
                        language: ar
                        avatar_url: null
                        created_at: '2026-05-20T10:00:00.000Z'
                      tokens:
                        access_token: eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIxIn0.signature
                        refresh_token: rt_01HM3XR0J2YTYAQ4HZD8E7K9TC
                        token_type: Bearer
                        expires_in: 900
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Sign in with email or phone + password
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              byEmail:
                value:
                  identifier: ahmed@example.qa
                  password: 'Str0ng!Pass'
              byPhone:
                value:
                  identifier: '+97455123456'
                  password: 'Str0ng!Pass'
      responses:
        '200':
          description: Sign-in successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseEnvelope'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid:
                  value:
                    success: false
                    error:
                      code: AUTH_001
                      message_key: errors.auth.invalid.credentials
                      message: Invalid credentials
                      details: null
                      request_id: req_abc123
        '403':
          description: Account suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current access token
      operationId: authLogout
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Exchange a refresh token for a new access + rotated refresh token
      operationId: authRefresh
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            examples:
              valid:
                value:
                  refresh_token: rt_01HM3XR0J2YTYAQ4HZD8E7K9TC
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseEnvelope'
        '401':
          description: Refresh token expired or revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/send-otp:
    post:
      tags: [Auth]
      summary: Send a 6-digit OTP to the user's phone via Twilio
      operationId: authSendOtp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpSendRequest'
            examples:
              valid:
                value:
                  phone: '+97455123456'
      responses:
        '202':
          description: OTP queued for delivery
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpSendResponseEnvelope'
              examples:
                queued:
                  value:
                    success: true
                    data:
                      sent_to: '+97455123456'
                      expires_in: 300
                      can_resend_in: 60
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify a 6-digit OTP and mark the phone as verified
      operationId: authVerifyOtp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyRequest'
            examples:
              valid:
                value:
                  phone: '+97455123456'
                  code: '482915'
      responses:
        '200':
          description: OTP accepted, phone now verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              examples:
                verified:
                  value:
                    success: true
                    data:
                      phone_verified: true
        '410':
          description: OTP expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                expired:
                  value:
                    success: false
                    error:
                      code: AUTH_004
                      message_key: errors.auth.otp.expired
                      message: OTP has expired
                      details: null
                      request_id: req_abc123
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/auth/resend-otp:
    post:
      tags: [Auth]
      summary: Resend the OTP after the cooldown window
      operationId: authResendOtp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpSendRequest'
      responses:
        '202':
          description: New OTP queued for delivery
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpSendResponseEnvelope'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Send a password-reset link to the user's email
      operationId: authForgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
            examples:
              valid:
                value:
                  email: ahmed@example.qa
      responses:
        '202':
          description: If the email exists, a reset link has been sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              examples:
                queued:
                  value:
                    success: true
                    data:
                      message_key: messages.auth.reset_link_sent

  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      summary: Set a new password using the token from the reset email
      operationId: authResetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
            examples:
              valid:
                value:
                  email: ahmed@example.qa
                  token: 0f7e8d9c-...
                  password: 'NewStr0ng!Pass'
                  password_confirmation: 'NewStr0ng!Pass'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/auth/send-email-verification:
    post:
      tags: [Auth]
      summary: Resend the email-verification link to the signed-in user
      operationId: authSendEmailVerification
      responses:
        '202':
          description: Verification link queued for delivery
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/verify-email/{id}/{hash}:
    get:
      tags: [Auth]
      summary: Confirm the email address via the signed link from the verification mail
      operationId: authVerifyEmail
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ULID'
        - name: hash
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '410':
          description: Verification link expired or already consumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ──────────────────────────────────────────────────────────────────────────
  # Account (Sprint 2 — Wave 1)
  # ──────────────────────────────────────────────────────────────────────────
  /api/v1/account/summary:
    get:
      tags: [Account]
      summary: At-a-glance counters for the dashboard
      operationId: accountSummary
      responses:
        '200':
          description: Counters returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSummaryEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/account/profile:
    get:
      tags: [Account]
      summary: Get the signed-in user's full profile + privacy settings
      operationId: accountProfileShow
      responses:
        '200':
          description: Profile returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountProfileEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Account]
      summary: Update the editable subset of the profile (full_name + language)
      operationId: accountProfileUpdate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            examples:
              valid:
                value:
                  full_name: Ahmed Al-Ali
                  language: ar
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountProfileEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/account/password:
    put:
      tags: [Account]
      summary: Change the signed-in user's password
      operationId: accountPasswordUpdate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequest'
            examples:
              valid:
                value:
                  current_password: 'OldStr0ng!Pass'
                  password: 'NewStr0ng!Pass#1'
                  password_confirmation: 'NewStr0ng!Pass#1'
      responses:
        '204':
          description: Password updated, other sessions revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Validation failed or current password incorrect (USER_004)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/account/sessions:
    get:
      tags: [Account]
      summary: List the user's active sessions
      operationId: accountSessionsIndex
      responses:
        '200':
          description: Sessions returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionsListEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/account/sessions/{id}:
    delete:
      tags: [Account]
      summary: Revoke a single session by id
      operationId: accountSessionsDestroy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Session revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Session not found or not owned by the caller (USER_001)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/account/verification-status:
    get:
      tags: [Account]
      summary: Email / phone / business / KYC verification snapshot
      operationId: accountVerificationStatus
      responses:
        '200':
          description: Verification status returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationStatusEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/account/privacy-settings:
    get:
      tags: [Account]
      summary: Get the user's privacy preferences
      operationId: accountPrivacyShow
      responses:
        '200':
          description: Privacy settings returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacySettingsEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Account]
      summary: Replace the user's privacy preferences
      operationId: accountPrivacyUpdate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivacySettings'
            examples:
              valid:
                value:
                  show_phone: true
                  show_email: false
                  allow_chat: true
                  indexed_by_search: true
      responses:
        '200':
          description: Privacy settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacySettingsEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/account/blocked-users:
    get:
      tags: [Account]
      summary: Paginated list of users the caller has blocked
      operationId: accountBlockedUsers
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: Blocked users returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockedUsersEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────────────────────────────────────────────────────────────────
  # Account lifecycle (Sprint 2 — Wave 2)
  # ──────────────────────────────────────────────────────────────────────────
  /api/v1/account/data-export-request:
    post:
      tags: [Account]
      summary: Request a GDPR-style export of the caller's personal data
      description: |
        Throttled to 1 export per user per 24h via Redis lock. Dispatches
        `ExportUserDataJob` to the `low` queue; the user receives an email
        with a signed download link (TTL 48h) when the export finishes.
      operationId: accountDataExportRequest
      responses:
        '202':
          description: Export queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataExportRequestEnvelope'
              examples:
                queued:
                  value:
                    success: true
                    data:
                      requested_at: '2026-05-23T10:00:00+03:00'
                      eta_minutes: 5
                      status: queued
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Already requested an export in the last 24h
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/account/data-export/{id}:
    get:
      tags: [Account]
      summary: Download a previously-generated data export
      description: |
        Requires a signed URL (TTL 48h) plus a Sanctum bearer for the owner.
        The export id must start with the caller's user-id prefix.
      operationId: accountDataExportDownload
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: expires
          in: query
          required: true
          schema:
            type: integer
        - name: signature
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: JSON file streamed
          content:
            application/json:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/account/deactivate:
    post:
      tags: [Account]
      summary: Soft-disable the caller's account
      description: |
        Verifies the current password, flips the user's status to
        `deactivated`, and burns every refresh token + Sanctum PAT. The user
        can self-reactivate by signing back in within 30 days.
      operationId: accountDeactivate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeactivateAccountRequest'
            examples:
              valid:
                value:
                  password: 'Str0ng!Pass'
                  reason: 'Taking a break'
      responses:
        '204':
          description: Account deactivated
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Wrong password (USER_005) or validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/account/delete-request:
    delete:
      tags: [Account]
      summary: Schedule the caller's account for permanent deletion
      description: |
        Verifies the password, sets status `pending_deletion`, records
        `deletion_requested_at`, burns all sessions, and queues
        `DeleteAccountJob` for 30 days later. Signing back in within the
        grace window implicitly cancels the request — the queued job
        re-checks the status before doing anything destructive.
      operationId: accountDeleteRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAccountRequest'
            examples:
              valid:
                value:
                  password: 'Str0ng!Pass'
                  reason: 'Found another platform'
      responses:
        '202':
          description: Deletion scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAccountResponseEnvelope'
              examples:
                scheduled:
                  value:
                    success: true
                    data:
                      deletion_scheduled_at: '2026-06-22T10:00:00+03:00'
                      status: pending_deletion
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Wrong password (USER_005) or validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ──────────────────────────────────────────────────────────────────────────
  # Uploads (Sprint 2 — Wave 2 ships avatar; Sprint 4 adds ad images)
  # ──────────────────────────────────────────────────────────────────────────
  /api/v1/uploads/avatar:
    post:
      tags: [Uploads]
      summary: Upload / replace the caller's avatar
      description: |
        Multipart upload. MIME must be jpeg / png / webp, max 5 MB. The file
        is stored via Spatie MediaLibrary in the `avatar` collection with
        `thumb` (200×200) and `medium` (480×480) conversions. Replaces any
        existing avatar.
      operationId: uploadsAvatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar stored, conversions ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarUploadEnvelope'
              examples:
                uploaded:
                  value:
                    success: true
                    data:
                      avatar_url: 'https://cdn.qbazaar.qa/u/01/avatar.jpg'
                      avatar_thumb_url: 'https://cdn.qbazaar.qa/u/01/conversions/avatar-thumb.jpg'
                      avatar_medium_url: 'https://cdn.qbazaar.qa/u/01/conversions/avatar-medium.jpg'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '413':
          description: File exceeds 5 MB limit (UPLOAD_001)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ──────────────────────────────────────────────────────────────────────────
  # Reference data — Categories & Locations (Sprint 3). All endpoints are
  # public (no auth) and cached server-side.
  # ──────────────────────────────────────────────────────────────────────────
  /api/v1/categories/tree:
    get:
      tags: [Reference]
      summary: Full active category tree (top-level + children)
      operationId: categoriesTree
      security: []
      responses:
        '200':
          description: Nested taxonomy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryTreeEnvelope'
              examples:
                tree:
                  value:
                    success: true
                    data:
                      - id: 01HM3XQVZP5KJWQR2K8N0DJSAW
                        parent_id: null
                        slug: vehicles
                        name: { ar: مركبات, en: Vehicles }
                        description: null
                        icon: Car
                        order: 0
                        is_active: true
                        custom_fields: null
                        custom_filters: null
                        ads_count: 0
                        created_at: '2026-05-23T12:00:00+00:00'
                        updated_at: '2026-05-23T12:00:00+00:00'
                        children:
                          - id: 01HM3XQVZP5KJWQR2K8N0DJSAX
                            parent_id: 01HM3XQVZP5KJWQR2K8N0DJSAW
                            slug: cars
                            name: { ar: سيارات, en: Cars }
                            description: null
                            icon: null
                            order: 0
                            is_active: true
                            custom_fields: []
                            custom_filters: []
                            ads_count: 0
                            created_at: '2026-05-23T12:00:00+00:00'
                            updated_at: '2026-05-23T12:00:00+00:00'
                            children: []

  /api/v1/categories/main:
    get:
      tags: [Reference]
      summary: Top-level categories only (no children)
      operationId: categoriesMain
      security: []
      responses:
        '200':
          description: Flat list of root categories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListEnvelope'

  /api/v1/categories/{slug}/stats:
    get:
      tags: [Reference]
      summary: Ad counters for a category (stub — Sprint 5 will populate)
      operationId: categoriesStats
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ad counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryStatsEnvelope'
              examples:
                stats:
                  value:
                    success: true
                    data:
                      ads_count: 0
                      sub_ads_count: 0
        '404':
          description: Category not found (CAT_001)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/categories/{slug}/filters:
    get:
      tags: [Reference]
      summary: Filter definitions for a category's search controls
      operationId: categoriesFilters
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Array of filter definitions (empty when none defined)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryFilterListEnvelope'
        '404':
          description: Category not found (CAT_001)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/categories/{slug}/fields:
    get:
      tags: [Reference]
      summary: Custom field definitions used when posting an ad in this category
      operationId: categoriesFields
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Array of field definitions (empty when none defined)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryFieldListEnvelope'
        '404':
          description: Category not found (CAT_001)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/locations/qatar:
    get:
      tags: [Reference]
      summary: Qatar location tree (cities + districts)
      operationId: locationsQatar
      security: []
      responses:
        '200':
          description: Nested location tree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationTreeEnvelope'
              examples:
                qatar:
                  value:
                    success: true
                    data:
                      - id: 01HM3XQVZP5KJWQR2K8N0DJSAY
                        parent_id: null
                        slug: doha
                        name: { ar: الدوحة, en: Doha }
                        type: city
                        lat: null
                        lng: null
                        children:
                          - id: 01HM3XQVZP5KJWQR2K8N0DJSAZ
                            parent_id: 01HM3XQVZP5KJWQR2K8N0DJSAY
                            slug: west-bay
                            name: { ar: الخليج الغربي, en: West Bay }
                            type: district
                            lat: null
                            lng: null
                            children: []

  # ──────────────────────────────────────────────────────────────────────────
  # Ads (Sprint 4 + 5 — Wave A)
  # ──────────────────────────────────────────────────────────────────────────
  /api/v1/ads:
    get:
      tags: [Ads]
      summary: Public feed of active ads
      operationId: adsIndex
      security: []
      parameters:
        - { name: category_id, in: query, schema: { $ref: '#/components/schemas/ULID' } }
        - { name: location_id, in: query, schema: { $ref: '#/components/schemas/ULID' } }
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
      responses:
        '200':
          description: Paginated list of active ads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdSummaryEnvelope'
              examples:
                feed:
                  value:
                    success: true
                    data:
                      - id: 01HM3XQV0AAAAAAAAAAAAAAAAA
                        title: Mountain bike for sale
                        price: 750.00
                        price_formatted: 750.00 QAR
                        price_type: fixed
                        currency: QAR
                        status: active
                        primary_image: null
                        category_slug: sports
                        location_slug: doha
                        published_at: '2026-05-24T09:00:00+00:00'
                        created_at: '2026-05-24T08:00:00+00:00'
                    meta:
                      current_page: 1
                      per_page: 20
                      total: 1
                      last_page: 1
                      has_more: false
    post:
      tags: [Ads]
      summary: Create a draft ad
      operationId: adsStore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdRequest'
      responses:
        '201':
          description: Draft ad created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /api/v1/ads/{id}:
    get:
      tags: [Ads]
      summary: Get ad detail
      operationId: adsShow
      security: []
      parameters:
        - { name: id, in: path, required: true, schema: { $ref: '#/components/schemas/ULID' } }
      responses:
        '200':
          description: Ad detail (public visibility rules)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdEnvelope'
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Ads]
      summary: Update an ad (owner only)
      operationId: adsUpdate
      parameters:
        - { name: id, in: path, required: true, schema: { $ref: '#/components/schemas/ULID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAdRequest'
      responses:
        '200':
          description: Ad updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Ads]
      summary: Soft-delete an ad (owner only)
      operationId: adsDestroy
      parameters:
        - { name: id, in: path, required: true, schema: { $ref: '#/components/schemas/ULID' } }
      responses:
        '204': { description: Ad soft-deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/ads/{id}/publish:
    post:
      tags: [Ads]
      summary: Publish a draft ad (DRAFT → ACTIVE)
      operationId: adsPublish
      parameters:
        - { name: id, in: path, required: true, schema: { $ref: '#/components/schemas/ULID' } }
      responses:
        '200':
          description: Ad published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdEnvelope'
              examples:
                published:
                  value:
                    success: true
                    data:
                      id: 01HM3XQV0AAAAAAAAAAAAAAAAA
                      status: active
                      published_at: '2026-05-24T09:00:00+00:00'
                      expires_at: '2026-06-23T09:00:00+00:00'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: AD_NOT_PUBLISHABLE / AD_IMAGES_REQUIRED / AD_DAILY_PUBLISH_LIMIT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/ads/{id}/mark-sold:
    post:
      tags: [Ads]
      summary: Mark an ad as sold
      operationId: adsMarkSold
      parameters:
        - { name: id, in: path, required: true, schema: { $ref: '#/components/schemas/ULID' } }
      responses:
        '200':
          description: Ad marked sold
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/ads/{id}/renew:
    post:
      tags: [Ads]
      summary: Renew an ad (extend expiry; flips EXPIRED → ACTIVE)
      operationId: adsRenew
      parameters:
        - { name: id, in: path, required: true, schema: { $ref: '#/components/schemas/ULID' } }
      responses:
        '200':
          description: Ad renewed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/ads/{ad}/images:
    post:
      tags: [Ads]
      summary: Upload one or more images for an ad
      operationId: adsImagesStore
      parameters:
        - { name: ad, in: path, required: true, schema: { $ref: '#/components/schemas/ULID' } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [images]
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: Images uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413':
          description: UPLOAD_TOO_LARGE
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: UPLOAD_INVALID_MIME / UPLOAD_MAX_IMAGES_REACHED / UPLOAD_MAGIC_BYTES_MISMATCH
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/ads/{ad}/images/reorder:
    post:
      tags: [Ads]
      summary: Reorder ad images
      operationId: adsImagesReorder
      parameters:
        - { name: ad, in: path, required: true, schema: { $ref: '#/components/schemas/ULID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderImagesRequest'
      responses:
        '200':
          description: Images reordered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /api/v1/media/{media}:
    delete:
      tags: [Ads]
      summary: Delete a single ad image
      operationId: mediaDestroy
      parameters:
        - { name: media, in: path, required: true, schema: { $ref: '#/components/schemas/ULID' } }
      responses:
        '204': { description: Image removed }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/account/ads:
    get:
      tags: [Ads]
      summary: List the caller's own ads (every status)
      operationId: accountAds
      parameters:
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
      responses:
        '200':
          description: Paginated list of the caller's ads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdSummaryEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ──────────────────────────────────────────────────────────────────────────
  # Search (Sprint 6)
  # ──────────────────────────────────────────────────────────────────────────
  /api/v1/search:
    get:
      tags: [Search]
      summary: Keyword + filter search backed by Meilisearch
      operationId: searchIndex
      security: []
      parameters:
        - { name: q, in: query, schema: { type: string, maxLength: 200 }, description: Optional keyword. Empty for filter-only search. }
        - { name: category_id, in: query, schema: { $ref: '#/components/schemas/ULID' } }
        - { name: category_slug, in: query, schema: { type: string, maxLength: 120 } }
        - { name: location_id, in: query, schema: { $ref: '#/components/schemas/ULID' } }
        - { name: location_slug, in: query, schema: { type: string, maxLength: 120 } }
        - { name: price_min, in: query, schema: { type: number, minimum: 0 } }
        - { name: price_max, in: query, schema: { type: number, minimum: 0 } }
        - { name: condition, in: query, schema: { $ref: '#/components/schemas/Condition' } }
        - { name: price_type, in: query, schema: { $ref: '#/components/schemas/PriceType' } }
        - { name: sort, in: query, schema: { type: string, enum: [latest, oldest, price_asc, price_desc], default: latest } }
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, minimum: 1, maximum: 50, default: 20 } }
      responses:
        '200':
          description: Paginated search results with facets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResultsEnvelope'
              examples:
                results:
                  value:
                    success: true
                    data:
                      - id: 01HM3XQV0AAAAAAAAAAAAAAAAA
                        title: Mountain bike for sale
                        price: 750.00
                        price_formatted: 750.00 QAR
                        price_type: fixed
                        currency: QAR
                        status: active
                        primary_image: null
                        category_slug: sports
                        location_slug: doha
                        published_at: '2026-05-24T09:00:00+00:00'
                        created_at: '2026-05-24T08:00:00+00:00'
                    meta:
                      current_page: 1
                      last_page: 1
                      per_page: 20
                      total: 1
                    facets:
                      categories: { sports: 1 }
                      locations: { doha: 1 }
                      conditions: { used: 1 }
                      price_types: { fixed: 1 }
                      price_buckets:
                        - { label: '500-1000', min: 500, max: 1000 }
        '422': { $ref: '#/components/responses/ValidationError' }
        '503':
          description: SEARCH_INDEX_UNAVAILABLE
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/search/suggestions:
    get:
      tags: [Search]
      summary: Prefix-match title suggestions for the search bar
      operationId: searchSuggestions
      security: []
      parameters:
        - { name: q, in: query, required: true, schema: { type: string, minLength: 1, maxLength: 100 } }
      responses:
        '200':
          description: Up to 10 title suggestions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { type: string }
                        maxItems: 10
              examples:
                suggestions:
                  value:
                    success: true
                    data: ['Mountain bike', 'Mountain trekking gear']

  /api/v1/account/saved-searches:
    get:
      tags: [Search]
      summary: List the caller's saved searches
      operationId: savedSearchesIndex
      responses:
        '200':
          description: Saved searches (newest first, max 10)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedSearchListEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Search]
      summary: Persist a new saved search (cap 10/user)
      operationId: savedSearchesStore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveSearchRequest'
      responses:
        '201':
          description: Saved search created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedSearchEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422':
          description: VALIDATION_FAILED or SEARCH_SAVED_LIMIT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/account/saved-searches/{id}:
    delete:
      tags: [Search]
      summary: Remove one of the caller's saved searches
      operationId: savedSearchesDestroy
      parameters:
        - { name: id, in: path, required: true, schema: { $ref: '#/components/schemas/ULID' } }
      responses:
        '204': { description: Saved search removed }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: SEARCH_SAVED_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ──────────────────────────────────────────────────────────────────────────
  # Favorites & Recently Viewed (Sprint 7)
  # ──────────────────────────────────────────────────────────────────────────
  /api/v1/ads/{id}/favorite:
    post:
      tags: [Favorites]
      summary: Toggle the caller's favourite status for an ad
      description: |
        Idempotent toggle. First call favourites the ad and bumps
        `ads.favorites_count`; second call by the same user removes it and
        decrements the count. Returns the post-toggle state so the client
        can render the heart icon + count immediately.
      operationId: favoritesToggle
      parameters:
        - { name: id, in: path, required: true, schema: { $ref: '#/components/schemas/ULID' } }
      responses:
        '200':
          description: Toggle result with the new favourite count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteToggleEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: AD_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/account/favorites:
    get:
      tags: [Favorites]
      summary: List the caller's favourited ads, newest favourite first
      operationId: favoritesIndex
      parameters:
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
      responses:
        '200':
          description: Paginated favourited ads (AdSummary + `favorited_at`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFavoritedAdSummaryEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/ads/{id}/view:
    post:
      tags: [RecentlyViewed]
      summary: Record an ad view (authenticated user OR anonymous session)
      description: |
        Tracks a view and increments `ads.views_count`. Throttled to one
        recorded view per (viewer, ad) per hour. Authenticated users are
        identified via their bearer token; anonymous clients pass a
        stable identifier in the `X-Session-Id` header. Calls without
        either identity are accepted and silently no-op.
      operationId: recentlyViewedTrack
      security: []
      parameters:
        - { name: id, in: path, required: true, schema: { $ref: '#/components/schemas/ULID' } }
        - name: X-Session-Id
          in: header
          required: false
          schema: { type: string, maxLength: 64 }
          description: Stable opaque session id for anonymous viewers.
      responses:
        '204': { description: View recorded, throttled, or silent no-op }
        '404':
          description: AD_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/account/recently-viewed:
    get:
      tags: [RecentlyViewed]
      summary: List the caller's recently-viewed ads, newest first
      operationId: recentlyViewedIndex
      parameters:
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
      responses:
        '200':
          description: Paginated recently-viewed ads (AdSummary + `viewed_at`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRecentlyViewedAdSummaryEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
    delete:
      tags: [RecentlyViewed]
      summary: Clear the caller's recently-viewed history
      operationId: recentlyViewedClear
      responses:
        '204': { description: History cleared }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ──────────────────────────────────────────────────────────────────────────
  # Users (Sprint 2 — Wave 1)
  # ──────────────────────────────────────────────────────────────────────────
  /api/v1/users/{user}/block:
    post:
      tags: [Users]
      summary: Block a user
      operationId: usersBlock
      parameters:
        - name: user
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ULID'
      responses:
        '200':
          description: User blocked (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockResultEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Cannot block an administrator (USER_002)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Cannot block yourself (USER_003)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Users]
      summary: Unblock a user (idempotent)
      operationId: usersUnblock
      parameters:
        - name: user
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ULID'
      responses:
        '204':
          description: Unblocked (or nothing to unblock)
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/{user}/public-profile:
    get:
      tags: [Users]
      summary: Public read-only profile of any active user
      operationId: usersPublicProfile
      security: []
      parameters:
        - name: user
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ULID'
      responses:
        '200':
          description: Public profile returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicProfileEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/users/{user}/ads:
    get:
      tags: [Users]
      summary: Public list of a user's active ads (stub until Sprint 5)
      operationId: usersAds
      security: []
      parameters:
        - name: user
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ULID'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: Paginated ads (empty stub)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    # ─── Envelopes ──────────────────────────────────────────────────
    SuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          description: Payload — shape varies per endpoint
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    ErrorEnvelope:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          $ref: '#/components/schemas/Error'

    Error:
      type: object
      required: [code, message_key, message]
      properties:
        code:
          type: string
          description: Stable error code from error-codes.md
          example: AUTH_001
        message_key:
          type: string
          description: i18n key the client should look up
          example: errors.auth.invalid_credentials
        message:
          type: string
          description: Human-readable fallback in the requested locale
          example: Invalid credentials
        details:
          oneOf:
            - type: 'null'
            - type: object
              additionalProperties:
                type: array
                items:
                  type: string
          description: Field-level validation errors keyed by field name
        request_id:
          type: string
          description: Correlation id for log lookups
          example: req_abc123

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total:
          type: integer
          example: 156
        has_more:
          type: boolean
          example: true
        next_cursor:
          type: [string, 'null']
          description: For cursor-based endpoints; null on the last page
          example: null

    # ─── Primitives ────────────────────────────────────────────────
    ULID:
      type: string
      pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
      example: 01HM3XQVZP5KJWQR2K8N0DJSAW

    Money:
      type: object
      required: [amount, currency, formatted]
      properties:
        amount:
          type: number
          format: float
          example: 5000
        currency:
          type: string
          example: QAR
        formatted:
          type: string
          example: '5,000 ر.ق'

    TranslatedString:
      type: object
      properties:
        ar:
          type: string
        en:
          type: string

    # ─── Domain ──────────────────────────────────────────────────────
    HealthResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: object
              required: [status, version, timestamp]
              properties:
                status:
                  type: string
                  enum: [ok]
                version:
                  type: string
                  example: 1.0.0
                timestamp:
                  type: string
                  format: date-time

    # ── Auth (Sprint 1) ──────────────────────────────────────────────
    User:
      type: object
      required: [id, full_name, email, phone, account_type, status, email_verified, phone_verified, language, created_at]
      properties:
        id:
          $ref: '#/components/schemas/ULID'
        full_name:
          type: string
          example: أحمد العلي
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: '^\+974[0-9]{8}$'
          example: '+97455123456'
        account_type:
          type: string
          enum: [private, business]
        status:
          type: string
          enum: [active, suspended, deactivated, pending_deletion]
        email_verified:
          type: boolean
        phone_verified:
          type: boolean
        language:
          type: string
          enum: [ar, en]
        avatar_url:
          type: [string, 'null']
          format: uri
        avatar_thumb_url:
          type: [string, 'null']
          format: uri
          description: 200×200 conversion served by MediaLibrary
        avatar_medium_url:
          type: [string, 'null']
          format: uri
          description: 480×480 conversion served by MediaLibrary
        created_at:
          type: string
          format: date-time

    Token:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
          description: Sanctum personal access token, ~15-minute lifetime
        refresh_token:
          type: string
          description: Opaque token used by POST /auth/refresh, ~30-day lifetime, rotated on every refresh
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Seconds until access_token expires
          example: 900

    RegisterRequest:
      type: object
      required: [full_name, email, phone, password, account_type, accepted_terms]
      properties:
        full_name:
          type: string
          minLength: 3
          maxLength: 80
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: '^\+974[0-9]{8}$'
          example: '+97455123456'
        password:
          type: string
          minLength: 8
          description: Must contain uppercase, lowercase, number and symbol
          example: 'Str0ng!Pass'
        account_type:
          type: string
          enum: [private, business]
        language:
          type: string
          enum: [ar, en]
        accepted_terms:
          type: boolean
          enum: [true]

    LoginRequest:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          description: Either email OR Qatar phone (+974XXXXXXXX)
          example: ahmed@example.qa
        password:
          type: string
          example: 'Str0ng!Pass'

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    OtpSendRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          pattern: '^\+974[0-9]{8}$'
          example: '+97455123456'

    OtpVerifyRequest:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
          pattern: '^\+974[0-9]{8}$'
          example: '+97455123456'
        code:
          type: string
          pattern: '^[0-9]{6}$'
          example: '482915'

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [email, token, password, password_confirmation]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
        password:
          type: string
          minLength: 8
        password_confirmation:
          type: string
          minLength: 8

    AuthResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: object
              required: [user, tokens]
              properties:
                user:
                  $ref: '#/components/schemas/User'
                tokens:
                  $ref: '#/components/schemas/Token'

    OtpSendResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: object
              required: [sent_to, expires_in, can_resend_in]
              properties:
                sent_to:
                  type: string
                  description: Phone number the OTP was sent to (masked in production logs)
                expires_in:
                  type: integer
                  description: Seconds until the OTP becomes invalid
                  example: 300
                can_resend_in:
                  type: integer
                  description: Seconds the client must wait before calling resend-otp
                  example: 60

    # ── Account & Users (Sprint 2 Wave 1) ───────────────────────────
    AccountSummary:
      type: object
      required: [my_ads, drafts, conversations, unread_notifications, favorites]
      properties:
        my_ads:
          type: integer
          example: 0
        drafts:
          type: integer
          example: 0
        conversations:
          type: integer
          example: 0
        unread_notifications:
          type: integer
          example: 0
        favorites:
          type: integer
          example: 0

    AccountSummaryEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AccountSummary'

    PrivacySettings:
      type: object
      required: [show_phone, show_email, allow_chat, indexed_by_search]
      properties:
        show_phone:
          type: boolean
          default: true
        show_email:
          type: boolean
          default: false
        allow_chat:
          type: boolean
          default: true
        indexed_by_search:
          type: boolean
          default: true

    PrivacySettingsEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PrivacySettings'

    AccountProfile:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          required: [privacy_settings]
          properties:
            privacy_settings:
              $ref: '#/components/schemas/PrivacySettings'

    AccountProfileEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AccountProfile'

    UpdateProfileRequest:
      type: object
      required: [full_name, language]
      properties:
        full_name:
          type: string
          minLength: 3
          maxLength: 80
        language:
          type: string
          enum: [ar, en]

    UpdatePasswordRequest:
      type: object
      required: [current_password, password, password_confirmation]
      properties:
        current_password:
          type: string
        password:
          type: string
          minLength: 8
          description: Must contain uppercase, lowercase, number and symbol
        password_confirmation:
          type: string
          minLength: 8

    Session:
      type: object
      required: [id, name, is_current]
      properties:
        id:
          type: string
          example: '17'
        name:
          type: string
          example: api
        last_used_at:
          type: [string, 'null']
          format: date-time
        created_at:
          type: [string, 'null']
          format: date-time
        expires_at:
          type: [string, 'null']
          format: date-time
        device_label:
          type: [string, 'null']
          example: web / Chrome
        ip_address:
          type: [string, 'null']
          example: 1.2.3.4
        is_current:
          type: boolean

    SessionsListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Session'

    VerificationStatus:
      type: object
      required: [email_verified, phone_verified, business_verified, kyc_status]
      properties:
        email_verified:
          type: boolean
        phone_verified:
          type: boolean
        business_verified:
          type: boolean
          description: Placeholder until Phase 2 business-verification ships
        kyc_status:
          type: string
          enum: [none, pending, approved, rejected]
          description: Placeholder until Phase 2 KYC ships

    VerificationStatusEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/VerificationStatus'

    BlockedUser:
      type: object
      required: [id, full_name, blocked_at]
      properties:
        id:
          $ref: '#/components/schemas/ULID'
        full_name:
          type: string
        avatar_url:
          type: [string, 'null']
          format: uri
        blocked_at:
          type: string
          format: date-time

    BlockedUsersEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/BlockedUser'
            meta:
              $ref: '#/components/schemas/PaginationMeta'

    BlockResultEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: object
              required: [blocked, user_id]
              properties:
                blocked:
                  type: boolean
                  example: true
                user_id:
                  $ref: '#/components/schemas/ULID'

    DeactivateAccountRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          description: Current account password (defence-in-depth).
        reason:
          type: [string, 'null']
          maxLength: 500
          description: Optional free-text reason surfaced in the activity log.

    DeleteAccountRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
        reason:
          type: [string, 'null']
          maxLength: 500

    DeleteAccountResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: object
              required: [deletion_scheduled_at, status]
              properties:
                deletion_scheduled_at:
                  type: string
                  format: date-time
                status:
                  type: string
                  enum: [pending_deletion]

    DataExportRequest:
      type: object
      required: [requested_at, eta_minutes, status]
      properties:
        requested_at:
          type: string
          format: date-time
        eta_minutes:
          type: integer
          example: 5
        status:
          type: string
          enum: [queued]

    DataExportRequestEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DataExportRequest'

    AvatarUploadResponse:
      type: object
      required: [avatar_url, avatar_thumb_url, avatar_medium_url]
      properties:
        avatar_url:
          type: [string, 'null']
          format: uri
        avatar_thumb_url:
          type: [string, 'null']
          format: uri
        avatar_medium_url:
          type: [string, 'null']
          format: uri

    AvatarUploadEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AvatarUploadResponse'

    PublicProfile:
      type: object
      required: [id, full_name, account_type, joined_at, verification_badges, ads_count]
      properties:
        id:
          $ref: '#/components/schemas/ULID'
        full_name:
          type: string
        avatar_url:
          type: [string, 'null']
          format: uri
        account_type:
          type: string
          enum: [private, business]
        business_name:
          type: [string, 'null']
        joined_at:
          type: string
          format: date-time
        phone:
          type: string
          description: Only present when the target user has `show_phone=true`
        email:
          type: string
          format: email
          description: Only present when the target user has `show_email=true`
        verification_badges:
          type: object
          required: [email_verified, phone_verified, business_verified]
          properties:
            email_verified:
              type: boolean
            phone_verified:
              type: boolean
            business_verified:
              type: boolean
        ads_count:
          type: integer
          example: 0

    PublicProfileEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PublicProfile'

    # ── Reference data (Sprint 3) ────────────────────────────────────
    LocalizedString:
      type: object
      required: [ar, en]
      properties:
        ar:
          type: string
          example: سيارات
        en:
          type: string
          example: Cars

    Category:
      type: object
      required:
        [id, parent_id, slug, name, icon, order, is_active, ads_count, created_at, updated_at]
      properties:
        id:
          $ref: '#/components/schemas/ULID'
        parent_id:
          oneOf:
            - $ref: '#/components/schemas/ULID'
            - type: 'null'
        slug:
          type: string
          example: cars
        name:
          $ref: '#/components/schemas/LocalizedString'
        description:
          oneOf:
            - $ref: '#/components/schemas/LocalizedString'
            - type: 'null'
        icon:
          type: [string, 'null']
          example: Car
        order:
          type: integer
          example: 0
        is_active:
          type: boolean
        custom_fields:
          oneOf:
            - type: array
              items:
                $ref: '#/components/schemas/CategoryField'
            - type: 'null'
        custom_filters:
          oneOf:
            - type: array
              items:
                $ref: '#/components/schemas/CategoryFilter'
            - type: 'null'
        ads_count:
          type: integer
          example: 0
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CategoryNode:
      allOf:
        - $ref: '#/components/schemas/Category'
        - type: object
          required: [children]
          properties:
            children:
              type: array
              items:
                $ref: '#/components/schemas/CategoryNode'

    CategoryFilter:
      type: object
      required: [key, label, type]
      properties:
        key:
          type: string
          example: make
        label:
          $ref: '#/components/schemas/LocalizedString'
        type:
          type: string
          enum: [select, range, boolean]
        options:
          oneOf:
            - type: array
              items: { type: string }
            - type: 'null'

    CategoryField:
      type: object
      required: [key, label, type, required]
      properties:
        key:
          type: string
          example: year
        label:
          $ref: '#/components/schemas/LocalizedString'
        type:
          type: string
          enum: [text, number, select, boolean, date]
        required:
          type: boolean
        options:
          oneOf:
            - type: array
              items: { type: string }
            - type: 'null'

    Location:
      type: object
      required: [id, parent_id, slug, name, type, children]
      properties:
        id:
          $ref: '#/components/schemas/ULID'
        parent_id:
          oneOf:
            - $ref: '#/components/schemas/ULID'
            - type: 'null'
        slug:
          type: string
          example: west-bay
        name:
          $ref: '#/components/schemas/LocalizedString'
        type:
          type: string
          enum: [city, district, area]
        lat:
          type: [number, 'null']
          format: float
        lng:
          type: [number, 'null']
          format: float
        children:
          type: array
          items:
            $ref: '#/components/schemas/Location'

    CategoryStats:
      type: object
      required: [ads_count, sub_ads_count]
      properties:
        ads_count:
          type: integer
          example: 0
        sub_ads_count:
          type: integer
          example: 0

    CategoryTreeEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/CategoryNode'

    CategoryListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Category'

    CategoryStatsEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/CategoryStats'

    CategoryFilterListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/CategoryFilter'

    CategoryFieldListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/CategoryField'

    LocationTreeEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Location'

    # ───── Ads (Sprint 4 + 5 — Wave A) ─────
    AdStatus:
      type: string
      enum: [draft, pending, active, sold, expired, rejected, blocked]
      description: Ad lifecycle status. Only `active` ads are publicly visible.

    PriceType:
      type: string
      enum: [fixed, negotiable, free, contact]
      description: How the listing price should be interpreted by the UI.

    Condition:
      type: string
      enum: [new, like_new, used]

    MediaSize:
      type: object
      properties:
        url: { type: string, format: uri }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }

    MediaSizes:
      type: object
      description: Multi-size derivatives generated by the upload pipeline.
      properties:
        thumbnail: { type: string, format: uri }
        medium: { type: string, format: uri }
        large: { type: string, format: uri }
        original_webp: { type: string, format: uri }

    Media:
      type: object
      properties:
        id: { $ref: '#/components/schemas/ULID' }
        collection: { type: string, example: images }
        url: { type: string, format: uri }
        sizes: { $ref: '#/components/schemas/MediaSizes' }
        blurhash: { type: string, nullable: true }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        order: { type: integer }
        size_bytes: { type: integer }

    AdSummary:
      type: object
      required: [id, title, status, currency]
      properties:
        id: { $ref: '#/components/schemas/ULID' }
        title: { type: string }
        price: { type: number, nullable: true }
        price_formatted: { type: string, nullable: true, example: '750.00 QAR' }
        price_type: { $ref: '#/components/schemas/PriceType' }
        currency: { type: string, example: QAR }
        status: { $ref: '#/components/schemas/AdStatus' }
        primary_image: { $ref: '#/components/schemas/Media', nullable: true }
        category_slug: { type: string, nullable: true }
        location_slug: { type: string, nullable: true }
        published_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    Ad:
      type: object
      required: [id, title, description, status, currency, price_type]
      properties:
        id: { $ref: '#/components/schemas/ULID' }
        user_id: { $ref: '#/components/schemas/ULID' }
        category_id: { $ref: '#/components/schemas/ULID' }
        location_id: { $ref: '#/components/schemas/ULID' }
        title: { type: string, minLength: 5, maxLength: 120 }
        description: { type: string, minLength: 20, maxLength: 5000 }
        price: { type: number, nullable: true }
        price_type: { $ref: '#/components/schemas/PriceType' }
        currency: { type: string, example: QAR }
        condition: { $ref: '#/components/schemas/Condition', nullable: true }
        status: { $ref: '#/components/schemas/AdStatus' }
        custom_fields:
          type: object
          additionalProperties: true
          nullable: true
        views_count: { type: integer }
        favorites_count: { type: integer }
        category_slug: { type: string, nullable: true }
        location_slug: { type: string, nullable: true }
        images:
          type: array
          items: { $ref: '#/components/schemas/Media' }
        published_at: { type: string, format: date-time, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateAdRequest:
      type: object
      required: [category_id, location_id, title, description, price_type]
      properties:
        category_id: { $ref: '#/components/schemas/ULID' }
        location_id: { $ref: '#/components/schemas/ULID' }
        title: { type: string, minLength: 5, maxLength: 120 }
        description: { type: string, minLength: 20, maxLength: 5000 }
        price: { type: number, nullable: true, minimum: 0, maximum: 9999999 }
        price_type: { $ref: '#/components/schemas/PriceType' }
        condition: { $ref: '#/components/schemas/Condition', nullable: true }
        custom_fields:
          type: object
          additionalProperties: true
          nullable: true

    UpdateAdRequest:
      type: object
      properties:
        title: { type: string, minLength: 5, maxLength: 120 }
        description: { type: string, minLength: 20, maxLength: 5000 }
        price: { type: number, nullable: true, minimum: 0, maximum: 9999999 }
        price_type: { $ref: '#/components/schemas/PriceType' }
        condition: { $ref: '#/components/schemas/Condition', nullable: true }
        category_id: { $ref: '#/components/schemas/ULID' }
        location_id: { $ref: '#/components/schemas/ULID' }
        custom_fields:
          type: object
          additionalProperties: true
          nullable: true

    ReorderImagesRequest:
      type: object
      required: [order]
      properties:
        order:
          type: array
          description: Ordered list of media ULIDs — index 0 is the primary image.
          items: { $ref: '#/components/schemas/ULID' }

    AdEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Ad' }

    PaginatedAdSummaryEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/AdSummary' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }

    # ───── Search (Sprint 6) ─────
    SearchFacets:
      type: object
      description: Aggregated counts returned alongside search results.
      properties:
        categories:
          type: object
          additionalProperties: { type: integer }
        locations:
          type: object
          additionalProperties: { type: integer }
        conditions:
          type: object
          additionalProperties: { type: integer }
        price_types:
          type: object
          additionalProperties: { type: integer }
        price_buckets:
          type: array
          items:
            type: object
            required: [label, min]
            properties:
              label: { type: string }
              min: { type: number, nullable: true }
              max: { type: number, nullable: true }

    SearchResultsEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data, meta, facets]
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/AdSummary' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }
            facets: { $ref: '#/components/schemas/SearchFacets' }

    SavedSearch:
      type: object
      required: [id, name, query_params, created_at]
      properties:
        id: { $ref: '#/components/schemas/ULID' }
        name: { type: string, minLength: 1, maxLength: 60 }
        query_params:
          type: object
          additionalProperties: true
          description: Opaque envelope replayed verbatim against `/search`.
        created_at: { type: string, format: date-time }

    SaveSearchRequest:
      type: object
      required: [name, query_params]
      properties:
        name: { type: string, minLength: 1, maxLength: 60 }
        query_params:
          type: object
          additionalProperties: true

    SavedSearchEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/SavedSearch' }

    SavedSearchListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/SavedSearch' }

    # ───── Favorites & Recently Viewed (Sprint 7) ─────
    FavoriteToggleResponse:
      type: object
      required: [favorited, count]
      properties:
        favorited:
          type: boolean
          description: True after the toggle if the ad is now favourited by the caller.
        count:
          type: integer
          minimum: 0
          description: The new total favourites count for the ad.

    FavoriteToggleEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/FavoriteToggleResponse' }

    FavoritedAdSummary:
      allOf:
        - $ref: '#/components/schemas/AdSummary'
        - type: object
          required: [favorited_at]
          properties:
            favorited_at:
              type: string
              format: date-time
              nullable: true
              description: When the caller favourited this ad.

    PaginatedFavoritedAdSummaryEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/FavoritedAdSummary' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }

    RecentlyViewedAdSummary:
      allOf:
        - $ref: '#/components/schemas/AdSummary'
        - type: object
          required: [viewed_at]
          properties:
            viewed_at:
              type: string
              format: date-time
              description: When the caller most recently viewed this ad.

    PaginatedRecentlyViewedAdSummaryEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/RecentlyViewedAdSummary' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }

  responses:
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            unauthorized:
              value:
                success: false
                error:
                  code: AUTH_010
                  message_key: errors.auth.token_invalid
                  message: Token is invalid or expired
                  details: null
                  request_id: req_abc123

    Forbidden:
      description: Authenticated but not authorized for this resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

    NotFound:
      description: Resource does not exist or is hidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

    ValidationError:
      description: Request body failed validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            validation_failed:
              value:
                success: false
                error:
                  code: VALIDATION_FAILED
                  message_key: errors.validation_failed
                  message: The given data was invalid
                  details:
                    email: ['The email has already been taken']
                    phone: ['The phone format is invalid']
                  request_id: req_abc123

    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum token
      description: |
        Issued by `POST /auth/login`. Include as `Authorization: Bearer <access_token>`.
        Expires after 15 minutes — refresh via `POST /auth/refresh`.

security:
  - bearerAuth: []
