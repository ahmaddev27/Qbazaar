# /etc/nginx/sites-available/api.qbazzar.miete.site.conf
#
# Reverse-proxies api.qbazzar.miete.site → Laravel (php-fpm).
# Certbot rewrites this file in place to add HTTPS — keep the server_name
# accurate so the certbot --nginx run finds the right block.

server {
    listen 80;
    listen [::]:80;
    server_name api.qbazzar.miete.site;

    root /home/sanad/qbazaar/qbazaar-api/public;
    index index.php;

    # Laravel exposes its swagger + docs at /swagger and /docs (single source).
    # All real traffic flows through /api/v1/*. The root / serves Laravel welcome.

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    charset utf-8;
    client_max_body_size 12M;   # 10 MB image uploads + headroom

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Reverb WebSocket — Sprint 8 wires this to ws.api.qbazzar.miete.site OR via /reverb
    # location /reverb {
    #     proxy_pass http://127.0.0.1:8080;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    access_log /var/log/nginx/api.qbazzar.access.log;
    error_log  /var/log/nginx/api.qbazzar.error.log;
}
